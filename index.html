<head>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%234fc3f7'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='white' font-family='Arial'%3E🎄%3C/text%3E%3C/svg%3E">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0c1a2d 0%, #1a3a5f 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 40px;
            position: relative;
        }
        
        /* Канвас для фейерверков */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #4fc3f7;
            text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #bbdefb;
            opacity: 0.9;
        }
        
        /* Верхняя панель с ёлкой и музыкой */
        .top-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        
        /* Ёлка с гирляндой - ИСПРАВЛЕНО */
        .tree-container {
            position: relative;
            width: 200px;
            height: 250px;
            margin: 0 auto 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .tree-container:hover {
            transform: scale(1.05);
        }
        
        .tree {
            position: relative;
            width: 0;
            height: 0;
            border-left: 90px solid transparent;
            border-right: 90px solid transparent;
            border-bottom: 160px solid #2e7d32;
            margin: 0 auto;
            z-index: 2;
        }
        
        .tree::before {
            content: '';
            position: absolute;
            top: 30px;
            left: -70px;
            width: 0;
            height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 130px solid #43a047;
            z-index: 1;
        }
        
        .tree::after {
            content: '';
            position: absolute;
            top: 80px;
            left: -50px;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 90px solid #66bb6a;
            z-index: 1;
        }
        
        .tree-trunk {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 45px;
            background-color: #8b5a2b;
            border-radius: 5px;
            z-index: 0;
        }
        
        .garland {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        
        .light {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: blink 1s infinite;
            box-shadow: 0 0 10px currentColor;
        }
        
        .star {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            animation: starTwinkle 1.5s infinite;
            z-index: 4;
            text-shadow: 0 0 15px gold;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        
        @keyframes starTwinkle {
            0%, 100% { transform: translateX(-50%) scale(1); text-shadow: 0 0 15px gold; }
            50% { transform: translateX(-50%) scale(1.2); text-shadow: 0 0 30px gold; }
        }
        
        /* Музыкальные кнопки под ёлкой */
        .music-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
        }
        
        .music-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        
        .music-btn:hover {
            background: rgba(79, 195, 247, 0.4);
            transform: scale(1.1);
            box-shadow: 0 0 15px #4fc3f7;
        }
        
        .music-btn.playing {
            background: #4fc3f7;
            color: #0c1a2d;
            box-shadow: 0 0 20px #4fc3f7;
        }
        
        /* Выбор часового пояса */
        .timezone-selector {
            margin: 20px 0 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.08);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }
        
        .timezone-selector label {
            color: #bbdefb;
            font-size: 1.1rem;
        }
        
        .timezone-selector select {
            padding: 10px 25px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
        }
        
        .timezone-selector select option {
            background: #1a3a5f;
            color: white;
        }
        
        .timezone-selector select:hover {
            background: rgba(79, 195, 247, 0.3);
        }
        
        /* Панель управления форматом */
        .controls-panel {
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        
        .format-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .format-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        
        .format-btn:hover {
            background-color: rgba(79, 195, 247, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 195, 247, 0.3);
        }
        
        .format-btn.active {
            background-color: #4fc3f7;
            color: #0c1a2d;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.7);
        }
        
        /* Таймер */
        .countdown-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 20px;
            margin: 30px 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        
        .countdown-display {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        
        .time-unit {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 25px 15px;
            min-width: 140px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .time-unit.highlight {
            background: rgba(79, 195, 247, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(79, 195, 247, 0.4);
            border-color: #4fc3f7;
        }
        
        .time-value {
            font-size: 3.5rem;
            font-weight: 700;
            color: #4fc3f7;
            text-shadow: 0 0 15px rgba(79, 195, 247, 0.7);
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .time-label {
            font-size: 1.1rem;
            color: #bbdefb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .seconds-only .time-unit {
            min-width: 200px;
        }
        
        .seconds-only .time-value {
            font-size: 4.5rem;
        }
        
        .next-year {
            font-size: 2.2rem;
            color: #ffeb3b;
            margin-top: 30px;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.7);
        }
        
        .new-year-message {
            font-size: 2.8rem;

            animation: pulse 1.5s infinite;
            margin-top: 20px;

        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.8; transform: scale(1); }

        /* Кнопки поделиться - ПЕРЕМЕЩЕНЫ ВНИЗ */
        .share-section {
            margin: 40px 0 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .share-title {
            color: #bbdefb;

        }
        
        .share-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .share-btn {
            padding: 12px 25px;

            border-radius: 50px;
            font-size: 1rem;

            transition: all 0.3s;

        .share-btn.vk {

        .share-btn:hover {

            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }
        
        /* Счетчик посетителей */
        .visitor-counter {
            margin: 20px 0;
            color: #bbdefb;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;

            display: inline-block;
        }
        
        /* Футер с подписью */
        footer {
            margin-top: 40px;

        }
        
        .creator-credit {
            margin-top: 10px;

        .creator-credit a {

            font-weight: 600;
        }
        
        .creator-credit a:hover {

        }
        
        /* Снежинки (улучшенные) */
        .snowflakes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .snowflake {
            position: absolute;
            color: #fff;
            user-select: none;
            cursor: default;
            opacity: 0.7;
            animation: fall linear infinite;
            text-shadow: 0 0 10px rgba(255,255,255,0.7);
            filter: drop-shadow(0 0 5px rgba(79, 195, 247, 0.5));
        }
        
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }

        /* Адаптация под мобильные */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .time-unit {
                min-width: 120px;
                padding: 20px 10px;

            }

            }

            .format-btn {

                flex-direction: column;
                gap: 10px;
                border-radius: 20px;

        @media (max-width: 480px) {
            .countdown-display {
                gap: 15px;
            }
            
            .time-unit {
                min-width: 100px;
                padding: 15px 5px;
            }
            
            .time-value {
                font-size: 2.2rem;
            }
            
            .time-label {
                font-size: 0.9rem;
            }
            
            .seconds-only .time-unit {
                min-width: 140px;
            }
            
            .seconds-only .time-value {
                font-size: 2.8rem;

            .share-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }

    </style>
</head>
<body>
    <!-- Canvas для фейерверков -->
    <canvas id="fireworks-canvas"></canvas>
    
    <div class="container">
        <!-- Верхняя панель с ёлкой (ИСПРАВЛЕНО) -->
        <div class="top-panel">
            <div class="tree-container" onclick="toggleMusic()">
                <div class="tree">
                    <div class="star">⭐</div>
                    <div class="garland" id="garland"></div>
                </div>
                <div class="tree-trunk"></div>
            </div>
            
            <!-- Музыкальные кнопки под ёлкой -->
            <div class="music-controls">
                <button class="music-btn" id="playMusicBtn" onclick="toggleMusic()" title="Вкл/Выкл музыку">▶️</button>
                <button class="music-btn" id="volumeUpBtn" onclick="changeVolume(0.1)" title="Громче">🔊+</button>
                <button class="music-btn" id="volumeDownBtn" onclick="changeVolume(-0.1)" title="Тише">🔊-</button>
            </div>
            
            <p class="subtitle">👇 Нажми на ёлку чтобы включить музыку 👇</p>
        </div>
        
        <!-- Выбор часового пояса -->
        <div class="timezone-selector">
            <label>🌍 Часовой пояс:</label>
            <select id="timezone" onchange="changeTimezone()">
                <option value="0">Москва (MSK)</option>
                <option value="1">Калининград (+1)</option>
                <option value="2">Самара (+2)</option>
                <option value="3">Уфа (+3)</option>
                <option value="4">Екатеринбург (+4)</option>
                <option value="5">Омск (+5)</option>
                <option value="6">Новосибирск (+6)</option>
                <option value="7">Красноярск (+7)</option>
                <option value="8">Иркутск (+8)</option>
                <option value="9">Якутск (+9)</option>
                <option value="10">Владивосток (+10)</option>
                <option value="11">Магадан (+11)</option>
                <option value="12">Камчатка (+12)</option>
                <option value="-1">Минск (-1)</option>
                <option value="-2">Киев (-2)</option>
                <option value="-3">Тбилиси (-3)</option>
                <option value="-5">Лондон (-5)</option>
                <option value="-8">Нью-Йорк (-8)</option>
            </select>
        </div>
        
        <!-- Панель управления форматом -->
        <div class="controls-panel">
            <div class="format-selector">
                <button class="format-btn active" data-format="all">Все единицы</button>
                <button class="format-btn" data-format="days">Только дни</button>
                <button class="format-btn" data-format="hours">Только часы</button>
                <button class="format-btn" data-format="minutes">Только минуты</button>
                <button class="format-btn" data-format="seconds">Только секунды</button>
            </div>
        </div>
        
        <!-- Таймер -->
        <div class="countdown-container">
            <div class="countdown-display" id="countdown">
                <!-- Здесь будет отсчет -->
            </div>
            <div id="nextYear" class="next-year"></div>
            <div id="newYearMessage" class="new-year-message" style="display: none;"></div>
        </div>
        
        <!-- Кнопки поделиться (ПЕРЕМЕЩЕНЫ СЮДА) -->
        <div class="share-section">
            <div class="share-title">🎁 Поделись праздником с друзьями:</div>
            <div class="share-buttons">
                <button class="share-btn vk" onclick="share('vk')">
                    <span>📱</span> ВКонтакте
                </button>
                <button class="share-btn telegram" onclick="share('telegram')">
                    <span>📱</span> Telegram
                </button>
                <button class="share-btn whatsapp" onclick="share('whatsapp')">
                    <span>📱</span> WhatsApp
                </button>
                <button class="share-btn copy" onclick="copyLink()">
                    <span>📋</span> Скопировать
                </button>
            </div>
        </div>
        
        <!-- Счетчик посетителей -->
        <div class="visitor-counter">
            <span>👁️ Просмотров: </span>
            <span id="visitor-counter">1</span>
        </div>
    </div>
    
    <!-- Снежинки -->
    <div class="snowflakes" id="snowflakes"></div>
    
    <!-- Футер с подписью (ЗДЕСЬ УКАЗАЛ ТЕБЯ) -->
    <footer>
        <p>❄️ Сайт создан с любовью к Новому году ❄️</p>
        <div class="creator-credit">
            ✨ Разработано <a href="https://github.com/KapDen0" target="_blank">KapDen0</a> при поддержке ИИ ✨
        </div>
        <p style="margin-top: 15px; font-size: 0.8rem;">Обновляется в реальном времени | © 2026</p>
    </footer>

    <!-- Аудио элемент для музыки -->
    <audio id="newyear-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио
    </audio>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentFormat = 'all';
        let timezoneOffset = 0;
        let musicPlaying = false;
        let fireworksActive = false;
        let audio = document.getElementById('newyear-music');
        
        // ==================== ЁЛКА И ГИРЛЯНДА ====================
        function createGarland() {
            const garland = document.getElementById('garland');
            if (!garland) return;
            
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff8800', '#ff0088'];
            
            // Очищаем старую гирлянду
            garland.innerHTML = '';
            
            // Создаем огоньки по спирали ёлки
            for (let i = 0; i < 30; i++) {
                const light = document.createElement('div');
                light.className = 'light';
                light.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Распределяем по ёлке
                const angle = (i / 30) * Math.PI * 2;
                const radius = 40 + Math.random() * 30;
                light.style.left = 50 + Math.cos(angle) * radius + '%';
                light.style.top = 20 + Math.sin(angle) * 40 + 20 + '%';
                
                light.style.animationDelay = Math.random() * 2 + 's';
                light.style.animationDuration = 0.8 + Math.random() * 0.7 + 's';
                
                garland.appendChild(light);
            }
        }
        
        // ==================== МУЗЫКА ====================
        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
                document.getElementById('playMusicBtn').textContent = '▶️';
                document.getElementById('playMusicBtn').classList.remove('playing');
            } else {
                audio.volume = 0.5;
                audio.play().catch(e => {
                    console.log('Автовоспроизведение заблокировано браузером');
                    alert('Нажми на ёлку ещё раз после того как взаимодействовал со страницей');
                });
                document.getElementById('playMusicBtn').textContent = '⏸️';
                document.getElementById('playMusicBtn').classList.add('playing');
            }
            musicPlaying = !musicPlaying;
        }
        
        function changeVolume(delta) {
            audio.volume = Math.min(1, Math.max(0, audio.volume + delta));
        }
        
        // ==================== ЧАСОВОЙ ПОЯС ====================
        function changeTimezone() {
            timezoneOffset = parseInt(document.getElementById('timezone').value);
            updateCountdown();
        }
        
        // ==================== ПОДЕЛИТЬСЯ ====================

        // ==================== ФЕЙЕРВЕРКИ ====================
        class Firework {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.4;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = Math.random() * -6 - 3;
                this.particles = [];
                this.exploded = false;
            }
            
            update() {
                if (!this.exploded) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.15;
                    
                    if (this.vy >= 0) {
                        this.explode();
                    }
                } else {
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        this.particles[i].update();
                        if (this.particles[i].alpha <= 0) {
                            this.particles.splice(i, 1);
                        }
                    }
                }
            }
            
            explode() {
                this.exploded = true;
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff8800', '#ff0088', '#ff4444', '#44ff44'];
                
                for (let i = 0; i < 60; i++) {
                    this.particles.push(new Particle(
                        this.x, this.y,
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 8,
                        colors[Math.floor(Math.random() * colors.length)]
                    ));
                }
            }
            
            draw() {
                if (!this.exploded) {
                    this.ctx.beginPath();
                    this.ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                    this.ctx.fillStyle = 'white';
                    this.ctx.shadowColor = 'white';
                    this.ctx.shadowBlur = 10;
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                } else {
                    this.particles.forEach(p => p.draw(this.ctx));
                }
            }
        }
        
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.size = Math.random() * 4 + 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.08;
                this.alpha -= 0.008;
            }
            
            draw(ctx) {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }
        
        function startFireworks() {
            if (fireworksActive) return;
            
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let fireworks = [];
            let animationFrame;
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (Math.random() < 0.1) {
                    fireworks.push(new Firework(canvas, ctx));
                }
                
                for (let i = fireworks.length - 1; i >= 0; i--) {
                    fireworks[i].update();
                    fireworks[i].draw();
                    
                    if (fireworks[i].exploded && fireworks[i].particles.length === 0) {
                        fireworks.splice(i, 1);
                    }
                }
                
                if (fireworksActive) {
                    animationFrame = requestAnimationFrame(animate);
                }
            }
            
            fireworksActive = true;
            animate();
            
            // Остановить через 30 секунд
            setTimeout(() => {
                fireworksActive = false;
                canvas.style.display = 'none';
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                }
            }, 30000);
        }
        
        // ==================== ОСНОВНОЙ ТАЙМЕР ====================
        
        function updateVisitorCounter() {
            let visits = localStorage.getItem('pageVisits');
            if (visits) {

            }
            localStorage.setItem('pageVisits', visits);
            document.getElementById('visitor-counter').textContent = visits;

        function createSnowflakes() {

            for (let i = 0; i < snowflakeCount; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                snowflake.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                
                const size = Math.random() * 20 + 10;
                snowflake.style.fontSize = `${size}px`;
                snowflake.style.left = `${Math.random() * 100}vw`;
                snowflake.style.animationDuration = `${Math.random() * 10 + 8}s`;
                snowflake.style.animationDelay = `${Math.random() * 5}s`;
                
                snowflakesContainer.appendChild(snowflake);

        }
        
        function getNextNewYear() {
            const now = new Date();
            const mskTime = new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
            const localTime = new Date(mskTime.getTime() + timezoneOffset * 3600000);
            
            const currentYear = localTime.getFullYear();
            const nextNewYear = new Date(currentYear, 11, 31, 23, 59, 59, 999);
            
            if (localTime > nextNewYear) {
                return new Date(currentYear + 1, 0, 1, 0, 0, 0, 0);
            }
            
            return nextNewYear;
        }
        
        function formatNumber(num) {
            return num < 10 ? `0${num}` : num;
        }
        
        function updateCountdown() {
            const now = new Date();
            const mskTime = new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
            const localTime = new Date(mskTime.getTime() + timezoneOffset * 3600000);
            
            const newYear = getNextNewYear();
            const timeRemaining = newYear - localTime;
            
            if (timeRemaining <= 0) {
                showNewYearMessage();
                return;
            }
            
            const totalSeconds = Math.floor(timeRemaining / 1000);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            const totalDays = Math.floor(totalHours / 24);
            
            const seconds = totalSeconds % 60;
            const minutes = totalMinutes % 60;
            const hours = totalHours % 24;
            const days = totalDays;
            
            document.getElementById('nextYear').textContent = `✨ До ${newYear.getFullYear()} года осталось: ✨`;
            document.getElementById('nextYear').style.display = 'block';
            document.getElementById('newYearMessage').style.display = 'none';
            
            let countdownHTML = '';
            const countdownElement = document.getElementById('countdown');
            
            switch(currentFormat) {
                case 'seconds':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${totalSeconds.toLocaleString()}</div>
                            <div class="time-label">Секунд</div>
                        </div>
                    `;
                    countdownElement.classList.add('seconds-only');
                    break;
                    
                case 'minutes':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${totalMinutes.toLocaleString()}</div>
                            <div class="time-label">Минут</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
                    
                case 'hours':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${totalHours.toLocaleString()}</div>
                            <div class="time-label">Часов</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
                    
                case 'days':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${days.toLocaleString()}</div>
                            <div class="time-label">Дней</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
                    
                default:
                    countdownHTML = `
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(days)}</div>
                            <div class="time-label">Дней</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(hours)}</div>
                            <div class="time-label">Часов</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(minutes)}</div>
                            <div class="time-label">Минут</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(seconds)}</div>
                            <div class="time-label">Секунд</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
            }
            
            countdownElement.innerHTML = countdownHTML;
        }
        
        function showNewYearMessage() {
            const newYear = getNextNewYear();
            document.getElementById('newYearMessage').textContent = `🎉 С Новым ${newYear.getFullYear()} годом! 🎉`;
            document.getElementById('newYearMessage').style.display = 'block';
            document.getElementById('nextYear').style.display = 'none';
            document.getElementById('countdown').innerHTML = '';
            
            startFireworks();
            
            if (!musicPlaying) {
                toggleMusic();
            }
        }
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.addEventListener('DOMContentLoaded', function() {
            createGarland();
            createSnowflakes();
            updateVisitorCounter();
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            document.querySelectorAll('.format-btn').forEach(button => {
                button.addEventListener('click', function() {

                    currentFormat = this.getAttribute('data-format');
                    updateCountdown();
                });
            });
            
            window.addEventListener('resize', () => {
                const canvas = document.getElementById('fireworks-canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
            
            console.log('🎄 Сайт KapDen0 готов к Новому году!');
        });
    </script>
