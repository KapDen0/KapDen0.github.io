<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Иконка сайта -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%234fc3f7'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='white' font-family='Arial'%3E🎄%3C/text%3E%3C/svg%3E">
    
    <!-- Canvas для фейерверков -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0c1a2d 0%, #1a3a5f 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }
        
        /* Канвас для фейерверков */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #4fc3f7;
            text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #bbdefb;
            opacity: 0.9;
        }
        
        /* Ёлка с гирляндой */
        .tree-container {
            position: relative;
            width: 200px;
            height: 300px;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .tree-container:hover {
            transform: scale(1.05);
        }
        
        .tree {
            position: relative;
            width: 0;
            height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 150px solid #2e7d32;
            margin: 0 auto;
        }
        
        .tree::before {
            content: '';
            position: absolute;
            top: 40px;
            left: -60px;
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 120px solid #43a047;
        }
        
        .tree::after {
            content: '';
            position: absolute;
            top: 100px;
            left: -40px;
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 80px solid #66bb6a;
        }
        
        .tree-trunk {
            position: absolute;
            bottom: -30px;
            left: -15px;
            width: 30px;
            height: 40px;
            background-color: #8b5a2b;
            border-radius: 5px;
        }
        
        .garland {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .light {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        .star {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            animation: starTwinkle 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        @keyframes starTwinkle {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
        }
        
        /* Элементы управления */
        .controls-panel {
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .format-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .format-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .format-btn:hover {
            background-color: rgba(79, 195, 247, 0.2);
            transform: translateY(-2px);
        }
        
        .format-btn.active {
            background-color: #4fc3f7;
            color: #0c1a2d;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.7);
        }
        
        /* Выбор часового пояса */
        .timezone-selector {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .timezone-selector select {
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }
        
        .timezone-selector select option {
            background: #1a3a5f;
            color: white;
        }
        
        .timezone-selector select:hover {
            background: rgba(79, 195, 247, 0.3);
        }
        
        /* Кнопки управления музыкой */
        .music-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .music-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;

        /* Кнопки поделиться */

            display: flex;
            justify-content: center;

            flex-wrap: wrap;

        .share-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;

            align-items: center;

        .share-btn.vk {

        .share-btn.telegram {

        .share-btn.whatsapp {

        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);

        /* Таймер */
        .countdown-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 20px;
            margin: 30px 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .countdown-display {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        
        .time-unit {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 25px 15px;
            min-width: 140px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .time-unit.highlight {
            background: rgba(79, 195, 247, 0.15);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.4);
        }
        
        .time-value {
            font-size: 3.5rem;
            font-weight: 700;
            color: #4fc3f7;
            text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .time-label {
            font-size: 1.1rem;
            color: #bbdefb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .seconds-only .time-unit {
            min-width: 200px;
        }
        
        .seconds-only .time-value {
            font-size: 4.5rem;
        }
        
        .next-year {
            font-size: 2.2rem;
            color: #ffeb3b;
            margin-top: 30px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
        }
        
        .new-year-message {
            font-size: 2.5rem;
            color: #ffeb3b;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.7);
            animation: pulse 1.5s infinite;
            margin-top: 20px;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        /* Снежинки (улучшенные) */
        .snowflakes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .snowflake {
            position: absolute;
            color: #fff;
            user-select: none;
            cursor: default;
            opacity: 0.8;
            animation: fall linear infinite;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        
        footer {
            margin-top: 30px;
            color: #bbdefb;
            font-size: 0.9rem;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .time-unit {
                min-width: 120px;
                padding: 20px 10px;
            }
            
            .time-value {
                font-size: 2.8rem;
            }
            
            .seconds-only .time-unit {
                min-width: 160px;
            }
            
            .seconds-only .time-value {
                font-size: 3.5rem;
            }
            
            .format-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .countdown-display {
                gap: 15px;
            }
            
            .time-unit {
                min-width: 100px;
                padding: 15px 5px;
            }
            
            .time-value {
                font-size: 2.2rem;
            }
            
            .time-label {
                font-size: 0.9rem;
            }
            
            .seconds-only .time-unit {
                min-width: 140px;
            }
            
            .seconds-only .time-value {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Canvas для фейерверков -->
    <canvas id="fireworks-canvas"></canvas>
    
    <div class="container">
        <!-- Ёлка с гирляндой -->
        <div class="tree-container" onclick="toggleMusic()">
            <div class="tree">
                <div class="star">⭐</div>
                <div class="garland" id="garland"></div>
            </div>
            <div class="tree-trunk"></div>
        </div>
        
        <h1>Отсчет до Нового Года</h1>
        <p class="subtitle">Нажмите на ёлку чтобы включить/выключить музыку</p>
        
        <!-- Музыкальные кнопки -->
        <div class="music-controls">
            <button class="music-btn" id="playMusicBtn" onclick="toggleMusic()">▶️</button>
            <button class="music-btn" id="volumeUpBtn" onclick="changeVolume(0.1)">🔊+</button>
            <button class="music-btn" id="volumeDownBtn" onclick="changeVolume(-0.1)">🔊-</button>
        </div>
        
        <!-- Выбор часового пояса -->
        <div class="timezone-selector">
            <label>Часовой пояс:</label>
            <select id="timezone" onchange="changeTimezone()">
                <option value="0">Москва (MSK)</option>
                <option value="3">Калининград (+1)</option>
                <option value="2">Самара (+2)</option>
                <option value="5">Екатеринбург (+5)</option>
                <option value="7">Красноярск (+7)</option>
                <option value="8">Иркутск (+8)</option>
                <option value="9">Якутск (+9)</option>
                <option value="11">Камчатка (+11)</option>
                <option value="-5">Минск (-5)</option>
                <option value="-8">Лондон (-8)</option>
                <option value="-13">Нью-Йорк (-13)</option>
            </select>
        </div>
        
        <!-- Панель управления форматом -->
        <div class="controls-panel">
            <div class="format-selector">
                <button class="format-btn active" data-format="all">Все единицы времени</button>
                <button class="format-btn" data-format="days">Только в днях</button>
                <button class="format-btn" data-format="hours">Только в часах</button>
                <button class="format-btn" data-format="minutes">Только в минутах</button>
                <button class="format-btn" data-format="seconds">Только в секундах</button>
            </div>
        </div>
        
        <!-- Таймер -->
        <div class="countdown-container">
            <div class="countdown-display" id="countdown">
                <!-- Здесь будет отсчет -->
            </div>
            <div id="nextYear" class="next-year"></div>
            <div id="newYearMessage" class="new-year-message" style="display: none;"></div>
        </div>
        
        <!-- Кнопки поделиться -->
        <div class="share-buttons">
            <button class="share-btn vk" onclick="share('vk')">
                <span>📱</span> ВКонтакте
            </button>
            <button class="share-btn telegram" onclick="share('telegram')">
                <span>📱</span> Telegram
            </button>
            <button class="share-btn whatsapp" onclick="share('whatsapp')">
                <span>📱</span> WhatsApp
            </button>
            <button class="share-btn copy" onclick="copyLink()">
                <span>📋</span> Копировать ссылку
            </button>
        </div>
        
        <!-- Счетчик посетителей -->
        <div style="margin: 20px 0; color: #bbdefb; font-size: 0.9rem;">
            <span>👁️ Просмотров: </span>
            <span id="visitor-counter">1</span>
        </div>
        
        <footer>
            <p>Создано с ❄️ для встречи Нового года</p>
            <p>Обновляется в реальном времени</p>
        </footer>
    </div>
    
    <div class="snowflakes" id="snowflakes"></div>

    <!-- Аудио элемент для музыки -->
    <audio id="newyear-music" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио
    </audio>

    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentFormat = 'all';
        let timezoneOffset = 0; // смещение от Московского времени
        let musicPlaying = false;
        let fireworksActive = false;
        let audio = document.getElementById('newyear-music');
        
        // ==================== ФУНКЦИИ ДЛЯ ЁЛКИ И ГИРЛЯНДЫ ====================
        function createGarland() {
            const garland = document.getElementById('garland');
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            
            for (let i = 0; i < 20; i++) {
                const light = document.createElement('div');
                light.className = 'light';
                light.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                light.style.left = Math.random() * 100 + '%';
                light.style.top = Math.random() * 100 + '%';
                light.style.animationDelay = Math.random() * 2 + 's';
                garland.appendChild(light);
            }
        }
        
        // ==================== ФУНКЦИИ ДЛЯ МУЗЫКИ ====================
        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
                document.getElementById('playMusicBtn').textContent = '▶️';
                document.getElementById('playMusicBtn').classList.remove('playing');
            } else {
                audio.play().catch(e => console.log('Автовоспроизведение заблокировано'));
                document.getElementById('playMusicBtn').textContent = '⏸️';
                document.getElementById('playMusicBtn').classList.add('playing');
            }
            musicPlaying = !musicPlaying;
        }
        
        function changeVolume(delta) {
            audio.volume = Math.min(1, Math.max(0, audio.volume + delta));
        }
        
        // ==================== ФУНКЦИИ ДЛЯ ЧАСОВОГО ПОЯСА ====================
        function changeTimezone() {
            timezoneOffset = parseInt(document.getElementById('timezone').value);
            updateCountdown();
        }
        
        // ==================== ФУНКЦИИ ДЛЯ КНОПОК ПОДЕЛИТЬСЯ ====================
        function share(platform) {
            const url = encodeURIComponent('https://kapden0.github.io');
            const text = encodeURIComponent('Смотри сколько осталось до Нового года! 🎄');
            
            let shareUrl = '';
            
            switch(platform) {
                case 'vk':
                    shareUrl = `https://vk.com/share.php?url=${url}&title=${text}`;
                    break;
                case 'telegram':
                    shareUrl = `https://t.me/share/url?url=${url}&text=${text}`;
                    break;
                case 'whatsapp':
                    shareUrl = `https://wa.me/?text=${text}%20${url}`;
                    break;
            }
            
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }
        
        function copyLink() {
            navigator.clipboard.writeText('https://kapden0.github.io').then(() => {
                alert('Ссылка скопирована!');
            });
        }
        
        // ==================== ФУНКЦИИ ДЛЯ ФЕЙЕРВЕРКОВ ====================
        class Firework {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.5;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * -5 - 2;
                this.particles = [];
                this.exploded = false;
            }
            
            update() {
                if (!this.exploded) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.1;
                    
                    if (this.vy >= 0) {
                        this.explode();
                    }
                } else {
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        this.particles[i].update();
                        if (this.particles[i].alpha <= 0) {
                            this.particles.splice(i, 1);
                        }
                    }
                }
            }
            
            explode() {
                this.exploded = true;
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff8800', '#ff0088'];
                
                for (let i = 0; i < 50; i++) {
                    this.particles.push(new Particle(
                        this.x, this.y,
                        (Math.random() - 0.5) * 6,
                        (Math.random() - 0.5) * 6,
                        colors[Math.floor(Math.random() * colors.length)]
                    ));
                }
            }
            
            draw() {
                if (!this.exploded) {
                    this.ctx.beginPath();
                    this.ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    this.ctx.fillStyle = 'white';
                    this.ctx.fill();
                } else {
                    this.particles.forEach(p => p.draw(this.ctx));
                }
            }
        }
        
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.size = Math.random() * 3 + 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= 0.01;
            }
            
            draw(ctx) {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        function startFireworks() {
            if (fireworksActive) return;
            
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let fireworks = [];
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (Math.random() < 0.05) {
                    fireworks.push(new Firework(canvas, ctx));
                }
                
                for (let i = fireworks.length - 1; i >= 0; i--) {
                    fireworks[i].update();
                    fireworks[i].draw();
                    
                    if (fireworks[i].exploded && fireworks[i].particles.length === 0) {
                        fireworks.splice(i, 1);
                    }
                }
                
                requestAnimationFrame(animate);
            }
            
            fireworksActive = true;
            animate();
            
            // Остановить через 30 секунд
            setTimeout(() => {
                canvas.style.display = 'none';
                fireworksActive = false;
            }, 30000);
        }
        
        // ==================== ОСНОВНЫЕ ФУНКЦИИ ТАЙМЕРА ====================
        
        // Счетчик посещений
        function updateVisitorCounter() {
            let visits = localStorage.getItem('pageVisits');
            if (visits) {
                visits = parseInt(visits) + 1;
            } else {
                visits = 1;
            }
            localStorage.setItem('pageVisits', visits);
            document.getElementById('visitor-counter').textContent = visits;
        }
        
        // Создание красивых снежинок
        function createSnowflakes() {
            const snowflakesContainer = document.getElementById('snowflakes');
            const snowflakeCount = 70;
            const symbols = ['❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '❄️', '⭐', '✨'];
            
            for (let i = 0; i < snowflakeCount; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                
                // Случайный символ
                snowflake.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Случайный размер
                const size = Math.random() * 20 + 10;
                snowflake.style.fontSize = `${size}px`;
                
                // Случайная позиция
                snowflake.style.left = `${Math.random() * 100}vw`;
                
                // Случайная продолжительность анимации
                const duration = Math.random() * 10 + 8;
                snowflake.style.animationDuration = `${duration}s`;
                
                // Случайная задержка
                snowflake.style.animationDelay = `${Math.random() * 5}s`;
                
                snowflakesContainer.appendChild(snowflake);
            }
        }
        
        // Получение даты следующего Нового года с учетом часового пояса
        function getNextNewYear() {
            const now = new Date();
            // Корректируем время с учетом выбранного часового пояса
            const mskTime = new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
            const localTime = new Date(mskTime.getTime() + timezoneOffset * 3600000);
            
            const currentYear = localTime.getFullYear();
            const nextNewYear = new Date(currentYear + 1, 0, 1, 0, 0, 0, 0);
            
            if (localTime > nextNewYear) {
                return new Date(currentYear + 1, 0, 1, 0, 0, 0, 0);
            }
            
            return nextNewYear;
        }
        
        // Форматирование чисел
        function formatNumber(num) {
            return num < 10 ? `0${num}` : num;
        }
        
        // Обновление отображения отсчета
        function updateCountdown() {
            const now = new Date();
            const mskTime = new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
            const localTime = new Date(mskTime.getTime() + timezoneOffset * 3600000);
            
            const newYear = getNextNewYear();
            const timeRemaining = newYear - localTime;
            
            if (timeRemaining <= 0) {
                showNewYearMessage();
                return;
            }
            
            const totalSeconds = Math.floor(timeRemaining / 1000);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            const totalDays = Math.floor(totalHours / 24);
            
            const seconds = totalSeconds % 60;
            const minutes = totalMinutes % 60;
            const hours = totalHours % 24;
            const days = totalDays;
            
            document.getElementById('nextYear').textContent = `До ${newYear.getFullYear()} года осталось:`;
            document.getElementById('nextYear').style.display = 'block';
            document.getElementById('newYearMessage').style.display = 'none';
            
            let countdownHTML = '';
            const countdownElement = document.getElementById('countdown');
            
            switch(currentFormat) {
                case 'seconds':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${totalSeconds.toLocaleString()}</div>
                            <div class="time-label">Секунд</div>
                        </div>
                    `;
                    countdownElement.classList.add('seconds-only');
                    break;
                    
                case 'minutes':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${totalMinutes.toLocaleString()}</div>
                            <div class="time-label">Минут</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
                    
                case 'hours':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${totalHours.toLocaleString()}</div>
                            <div class="time-label">Часов</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
                    
                case 'days':
                    countdownHTML = `
                        <div class="time-unit highlight">
                            <div class="time-value">${days.toLocaleString()}</div>
                            <div class="time-label">Дней</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
                    
                default:
                    countdownHTML = `
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(days)}</div>
                            <div class="time-label">Дней</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(hours)}</div>
                            <div class="time-label">Часов</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(minutes)}</div>
                            <div class="time-label">Минут</div>
                        </div>
                        <div class="time-unit">
                            <div class="time-value">${formatNumber(seconds)}</div>
                            <div class="time-label">Секунд</div>
                        </div>
                    `;
                    countdownElement.classList.remove('seconds-only');
                    break;
            }
            
            countdownElement.innerHTML = countdownHTML;
        }
        
        // Показать сообщение о наступлении Нового года
        function showNewYearMessage() {
            const newYear = getNextNewYear();
            document.getElementById('newYearMessage').textContent = `С Новым ${newYear.getFullYear()} годом! 🎉`;
            document.getElementById('newYearMessage').style.display = 'block';
            document.getElementById('nextYear').style.display = 'none';
            document.getElementById('countdown').innerHTML = '';
            
            // Запускаем фейерверки
            startFireworks();
            
            // Включаем музыку
            if (!musicPlaying) {
                toggleMusic();
            }
        }
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Создаем гирлянду
            createGarland();
            
            // Создаем снежинки
            createSnowflakes();
            
            // Обновляем счетчик посещений
            updateVisitorCounter();
            
            // Запускаем таймер
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            // Обработчики для кнопок формата
            document.querySelectorAll('.format-btn').forEach(button => {
                button.addEventListener('click', function() {
                    document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    currentFormat = this.getAttribute('data-format');
                    updateCountdown();
                });
            });
            
            // Обработка resize для canvas
            window.addEventListener('resize', () => {
                const canvas = document.getElementById('fireworks-canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        });
    </script>
</body>
