<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отсчет до Нового Года | Таймер онлайн</title>
    <meta name="description" content="Красивый отсчет до Нового года с выбором формата отображения. Смотрите сколько осталось дней, часов, минут и секунд до праздника.">
    <meta name="keywords" content="новый год, отсчет времени, таймер, сколько осталось до нового года">
    
    <!-- Иконка сайта (favicon) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%234fc3f7'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='white' font-family='Arial'%3E🎄%3C/text%3E%3C/svg%3E">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0c1a2d 0%, #1a3a5f 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #4fc3f7;
            text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #bbdefb;
            opacity: 0.9;
        }
        
        .controls {
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .format-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .format-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .format-btn:hover {
            background-color: rgba(79, 195, 247, 0.2);
            transform: translateY(-2px);
        }
        
        .format-btn.active {
            background-color: #4fc3f7;
            color: #0c1a2d;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.7);
        }
        
        .countdown-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .countdown-display {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        
        .time-unit {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 25px 15px;
            min-width: 140px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .time-unit.highlight {
            background: rgba(79, 195, 247, 0.15);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.4);
        }
        
        .time-value {
            font-size: 3.5rem;
            font-weight: 700;
            color: #4fc3f7;
            text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .time-label {
            font-size: 1.1rem;
            color: #bbdefb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .seconds-only .time-unit {
            min-width: 200px;
        }
        
        .seconds-only .time-value {
            font-size: 4.5rem;
        }
        
        .next-year {
            font-size: 2.2rem;
            color: #ffeb3b;
            margin-top: 30px;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
        }
        
        .new-year-message {
            font-size: 2.5rem;
            color: #ffeb3b;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.7);
            animation: pulse 1.5s infinite;
            margin-top: 20px;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .snowflakes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .snowflake {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        
        footer {
            margin-top: 30px;
            color: #bbdefb;
            font-size: 0.9rem;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .time-unit {
                min-width: 120px;
                padding: 20px 10px;
            }
            
            .time-value {
                font-size: 2.8rem;
            }
            
            .seconds-only .time-unit {
                min-width: 160px;
            }
            
            .seconds-only .time-value {
                font-size: 3.5rem;
            }
            
            .format-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .countdown-display {
                gap: 15px;
            }
            
            .time-unit {
                min-width: 100px;
                padding: 15px 5px;
            }
            
            .time-value {
                font-size: 2.2rem;
            }
            
            .time-label {
                font-size: 0.9rem;
            }
            
            .seconds-only .time-unit {
                min-width: 140px;
            }
            
            .seconds-only .time-value {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Отсчет до Нового Года</h1>
        <p class="subtitle">Выберите формат отображения времени до праздника</p>
        
        <div class="controls">
            <div class="format-selector">
                <button class="format-btn active" data-format="all">Все единицы времени</button>
                <button class="format-btn" data-format="days">Только в днях</button>
                <button class="format-btn" data-format="hours">Только в часах</button>
                <button class="format-btn" data-format="minutes">Только в минутах</button>
                <button class="format-btn" data-format="seconds">Только в секундах</button>
            </div>
        </div>
        
        <div class="countdown-container">
            <div class="countdown-display" id="countdown">
                <!-- Здесь будет отсчет -->
            </div>
            <div id="nextYear" class="next-year"></div>
            <div id="newYearMessage" class="new-year-message" style="display: none;"></div>
        </div>
        
        <!-- Счетчик посетителей -->
        <div style="margin: 20px 0; color: #bbdefb; font-size: 0.9rem;">
            <span>👁️ Просмотров: </span>
            <span id="visitor-counter">1</span>
        </div>
        
        <footer>
            <p>Создано с ❄️ для встречи Нового года</p>
            <p>Обновляется в реальном времени</p>
        </footer>
    </div>
    
    <div class="snowflakes" id="snowflakes"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Элементы DOM
            const countdownElement = document.getElementById('countdown');
            const nextYearElement = document.getElementById('nextYear');
            const newYearMessageElement = document.getElementById('newYearMessage');
            const formatButtons = document.querySelectorAll('.format-btn');
            const snowflakesContainer = document.getElementById('snowflakes');
            const visitorCounter = document.getElementById('visitor-counter');
            
            let currentFormat = 'all';
            
            // Счетчик посещений (хранится в localStorage)
            function updateVisitorCounter() {
                let visits = localStorage.getItem('pageVisits');
                if (visits) {
                    visits = parseInt(visits) + 1;
                } else {
                    visits = 1;
                }
                localStorage.setItem('pageVisits', visits);
                visitorCounter.textContent = visits;
            }
            
            // Создание снежинок
            function createSnowflakes() {
                const snowflakeCount = 50;
                
                for (let i = 0; i < snowflakeCount; i++) {
                    const snowflake = document.createElement('div');
                    snowflake.classList.add('snowflake');
                    
                    // Случайный размер от 2 до 6px
                    const size = Math.random() * 4 + 2;
                    snowflake.style.width = `${size}px`;
                    snowflake.style.height = `${size}px`;
                    
                    // Случайная позиция
                    snowflake.style.left = `${Math.random() * 100}vw`;
                    
                    // Случайная продолжительность анимации
                    const duration = Math.random() * 10 + 5;
                    snowflake.style.animationDuration = `${duration}s`;
                    
                    // Случайная задержка начала анимации
                    snowflake.style.animationDelay = `${Math.random() * 5}s`;
                    
                    snowflakesContainer.appendChild(snowflake);
                }
            }
            
            // Получение даты следующего Нового года
            function getNextNewYear() {
                const now = new Date();
                const currentYear = now.getFullYear();
                const nextNewYear = new Date(currentYear + 1, 0, 1, 0, 0, 0, 0);
                
                // Если Новый год уже прошел в этом году, берем следующий
                if (now > nextNewYear) {
                    return new Date(currentYear + 1, 0, 1, 0, 0, 0, 0);
                }
                
                // Если Новый год еще не наступил в этом году
                return nextNewYear;
            }
            
            // Форматирование чисел (добавление ведущего нуля)
            function formatNumber(num) {
                return num < 10 ? `0${num}` : num;
            }
            
            // Обновление отображения отсчета
            function updateCountdown() {
                const now = new Date();
                const newYear = getNextNewYear();
                const timeRemaining = newYear - now;
                
                // Если Новый год уже наступил
                if (timeRemaining <= 0) {
                    showNewYearMessage();
                    return;
                }
                
                // Расчет времени
                const totalSeconds = Math.floor(timeRemaining / 1000);
                const totalMinutes = Math.floor(totalSeconds / 60);
                const totalHours = Math.floor(totalMinutes / 60);
                const totalDays = Math.floor(totalHours / 24);
                
                const seconds = totalSeconds % 60;
                const minutes = totalMinutes % 60;
                const hours = totalHours % 24;
                const days = totalDays;
                
                // Отображение следующего года
                nextYearElement.textContent = `До ${newYear.getFullYear()} года осталось:`;
                nextYearElement.style.display = 'block';
                newYearMessageElement.style.display = 'none';
                
                // Отображение в зависимости от выбранного формата
                let countdownHTML = '';
                
                switch(currentFormat) {
                    case 'seconds':
                        countdownHTML = `
                            <div class="time-unit highlight">
                                <div class="time-value">${totalSeconds.toLocaleString()}</div>
                                <div class="time-label">Секунд</div>
                            </div>
                        `;
                        countdownElement.classList.add('seconds-only');
                        break;
                        
                    case 'minutes':
                        countdownHTML = `
                            <div class="time-unit highlight">
                                <div class="time-value">${totalMinutes.toLocaleString()}</div>
                                <div class="time-label">Минут</div>
                            </div>
                        `;
                        countdownElement.classList.remove('seconds-only');
                        break;
                        
                    case 'hours':
                        countdownHTML = `
                            <div class="time-unit highlight">
                                <div class="time-value">${totalHours.toLocaleString()}</div>
                                <div class="time-label">Часов</div>
                            </div>
                        `;
                        countdownElement.classList.remove('seconds-only');
                        break;
                        
                    case 'days':
                        countdownHTML = `
                            <div class="time-unit highlight">
                                <div class="time-value">${days.toLocaleString()}</div>
                                <div class="time-label">Дней</div>
                            </div>
                        `;
                        countdownElement.classList.remove('seconds-only');
                        break;
                        
                    default: // all
                        countdownHTML = `
                            <div class="time-unit">
                                <div class="time-value">${formatNumber(days)}</div>
                                <div class="time-label">Дней</div>
                            </div>
                            <div class="time-unit">
                                <div class="time-value">${formatNumber(hours)}</div>
                                <div class="time-label">Часов</div>
                            </div>
                            <div class="time-unit">
                                <div class="time-value">${formatNumber(minutes)}</div>
                                <div class="time-label">Минут</div>
                            </div>
                            <div class="time-unit">
                                <div class="time-value">${formatNumber(seconds)}</div>
                                <div class="time-label">Секунд</div>
                            </div>
                        `;
                        countdownElement.classList.remove('seconds-only');
                        break;
                }
                
                countdownElement.innerHTML = countdownHTML;
            }
            
            // Показать сообщение о наступлении Нового года
            function showNewYearMessage() {
                const newYear = getNextNewYear();
                newYearMessageElement.textContent = `С Новым ${newYear.getFullYear()} годом! 🎉`;
                newYearMessageElement.style.display = 'block';
                nextYearElement.style.display = 'none';
                countdownElement.innerHTML = '';
                
                // Добавляем больше снежинок для праздника
                for(let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        createSnowflakes();
                    }, i * 100);
                }
            }
            
            // Обработчики для кнопок выбора формата
            formatButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Удаляем активный класс у всех кнопок
                    formatButtons.forEach(btn => btn.classList.remove('active'));
                    
                    // Добавляем активный класс нажатой кнопке
                    this.classList.add('active');
                    
                    // Обновляем текущий формат
                    currentFormat = this.getAttribute('data-format');
                    
                    // Немедленно обновляем отображение
                    updateCountdown();
                });
            });
            
            // Инициализация
            createSnowflakes();
            updateVisitorCounter();
            updateCountdown();
            
            // Обновление каждую секунду
            setInterval(updateCountdown, 1000);
            
            // Добавляем информацию о копирайте в консоль для разработчиков
            console.log('🎄 Отсчет до Нового года работает! С наступающим!');
        });
    </script>
</body>
</html>
